    </symbol>
    <symbol id="save-project" viewBox="0 0 24 24">
      <path class="tool-f" d="M5 3h11l3 3v15H5z"/><path class="line tool-s" d="M8 3v6h8V4M8 21v-7h8v7"/>
    </symbol>
    <symbol id="project-properties" viewBox="0 0 24 24">
      <path class="tool-f" d="M5 4h14v16H5z"/><path class="line tool-s" d="M8 8h8M8 12h8M8 16h4"/>
    </symbol>
    <symbol id="settings" viewBox="0 0 24 24">
      <circle class="tool-f" cx="12" cy="12" r="3.2"/><path class="line tool-s" d="M12 3v3M12 18v3M4.2 7.5l2.6 1.5M17.2 15l2.6 1.5M19.8 7.5 17.2 9M6.8 15l-2.6 1.5M3 12h3M18 12h3"/>
    </symbol>
    <symbol id="export" viewBox="0 0 24 24">
