      <g transform="translate(728,0)"><rect class="tile" width="92" height="78" rx="8"/><use href="#info" x="33" y="12" width="26" height="26"/><text class="label" x="12" y="58">Info</text></g>
      <g transform="translate(832,0)"><rect class="tile" width="92" height="78" rx="8"/><use href="#import" x="33" y="12" width="26" height="26"/><text class="label" x="12" y="58">Import</text></g>
