<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">HVAC Designer dark theme SVG icon palette</title>
  <desc id="desc">Duotone SVG icon palette for the dark CoreUI theme.</desc>
  <defs>
    <style>
      .bg{fill:#14181c}.panel{fill:#1c2228;stroke:#334050;stroke-width:1}.label{fill:#a0aec0;font:13px Segoe UI,Arial,sans-serif}.head{fill:#f0f4f8;font:600 18px Segoe UI,Arial,sans-serif}.tile{fill:#222932;stroke:#334050;stroke-width:1}.line{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.9}.thin{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.45}.tool-s{stroke:#1689d8}.tool-f{fill:rgba(22,137,216,.16);stroke:#1689d8}.build-s{stroke:#e65a4b}.build-f{fill:rgba(230,90,75,.17);stroke:#e65a4b}.heat-s{stroke:#f26b3a}.heat-f{fill:rgba(242,107,58,.17);stroke:#f26b3a}.cool-s{stroke:#63c7ff}.cool-f{fill:rgba(99,199,255,.16);stroke:#63c7ff}.hydro-s{stroke:#3498db}.hydro-f{fill:rgba(52,152,219,.17);stroke:#3498db}.air-s{stroke:#2ecc71}.air-f{fill:rgba(46,204,113,.16);stroke:#2ecc71}.gas-s{stroke:#e67e22}.gas-f{fill:rgba(230,126,34,.18);stroke:#e67e22}.neutral-s{stroke:#a0aec0}.neutral-f{fill:rgba(160,174,192,.14);stroke:#a0aec0}.warn-s{stroke:#f59e0b}.warn-f{fill:rgba(245,158,11,.18);stroke:#f59e0b}
    </style>

    <symbol id="new-project" viewBox="0 0 24 24">
